# Canonical tmux configuration for this dotfiles repository.
# Future installation tooling should copy this file to the active tmux config location.

# --- plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'jimeh/tmuxifier'

# --- terminal and key handling ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -s extended-keys off

# --- general behavior ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# tmux configuration for image passthrough.
set -gq allow-passthrough on
set -g visual-activity off

# --- copy mode and clipboard ---
set -g mode-keys vi
if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# --- reload config ---
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux configuration"

# --- panes and navigation ---
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"

bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5

# --- sessions and popup workflow ---
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

bind-key -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  display-popup -d "#{pane_current_path}" -E "tmux new-session -A -s scratch"
}

# Initialize tmux plugin manager. Keep this line at the bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
